apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: interactive-lab
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interactive-lab
      tier: database
  template:
    metadata:
      labels:
        app: interactive-lab
        tier: database
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector:
    app: interactive-lab
    tier: database
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
